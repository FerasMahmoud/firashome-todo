name: Copy secrets to tethrx-feras
on:
  workflow_dispatch:
jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy ASC + match secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTH: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
        run: |
          set -euo pipefail
          R=FerasMahmoud/tethrx-feras
          gh secret set APP_STORE_CONNECT_ISSUER_ID -R "$R" --body "$APP_STORE_CONNECT_ISSUER_ID"
          gh secret set APP_STORE_CONNECT_KEY -R "$R" --body "$APP_STORE_CONNECT_KEY"
          gh secret set APP_STORE_CONNECT_KEY_ID -R "$R" --body "$APP_STORE_CONNECT_KEY_ID"
          gh secret set MATCH_PASSWORD -R "$R" --body "$MATCH_PASSWORD"
          gh secret set MATCH_GIT_URL -R "$R" --body "$MATCH_GIT_URL"
          gh secret set MATCH_GIT_BASIC_AUTH -R "$R" --body "$MATCH_GIT_BASIC_AUTH"
          echo "copied 6 secrets to $R"
          gh secret list -R "$R"
