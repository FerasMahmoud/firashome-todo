name: TestFlight
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
jobs:
  testflight:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen fastlane
      - run: xcodegen generate
      - name: Write API key (.p8)
        run: printf '%s' "${{ secrets.APP_STORE_CONNECT_KEY }}" > "/tmp/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
      - name: Build, sign & upload (xcodebuild auto-provisions via API key)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: fastlane beta
