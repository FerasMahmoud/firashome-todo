name: Screenshots

# Builds the app on a free macOS runner, walks each screen via a UI test,
# captures simulator screenshots, and publishes a device-frame gallery to
# GitHub Pages -> todo.firashome.uk.
#
# SPEED (2026 best practice):
#  - PUSH (every commit) = FAST path: iPhone 16 Pro Max ONLY. ~2-3 min feedback.
#  - workflow_dispatch(full=true) = all 4 devices (iPhone 16 Pro Max/Pro, iPad Pro 13", iPad mini).
#  - DerivedData cached across runs -> incremental builds skip unchanged files (up to ~50% faster).
#  - Homebrew/xcodegen cached.
#  - Index-store disabled (project.yml) -> less compiler work per build.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      full:
        description: 'Render ALL 4 devices (slower)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: screenshots
  cancel-in-progress: true

jobs:
  capture:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ (github.event.inputs.full == 'true') && fromJson('["iPhone 16 Pro Max","iPhone 16 Pro","iPad Pro 13-inch (M4)","iPad mini (A17 Pro)"]') || fromJson('["iPhone 16 Pro Max"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-2026

      - name: Install XcodeGen (cached)
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData (incremental builds)
        uses: actions/cache@v4
        with:
          path: build
          key: dd-${{ matrix.device }}-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: dd-${{ matrix.device }}-

      - name: Build for simulator (incremental)
        run: |
          xcodebuild build-for-testing \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -derivedDataPath build \
            -skipMacroValidation -skipPackagePluginValidation \
            | xcpretty

      - name: Run screenshot tests
        run: |
          xcodebuild test-without-building \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -only-testing:TodoScreenshotTests/ScreenshotTests \
            -resultBundlePath "results/${{ matrix.device }}.xcresult" \
            -derivedDataPath build || true

      - name: Export attachments
        run: |
          mkdir -p out
          xcrun xcresulttool export attachments \
            --path "results/${{ matrix.device }}.xcresult" \
            --output-path "out" || true

      - name: Normalize device folder name
        id: devname
        run: |
          name=$(echo "${{ matrix.device }}" | tr ' ' '-' | tr -d '()' | sed 's/[^A-Za-z0-9-]//g')
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Stage + friendly-rename screenshots
        run: |
          mkdir -p "gallery/devices/${{ steps.devname.outputs.name }}"
          # Screenshots export with UUID filenames in capture order; rename to friendly page names.
          labels=("01-today" "02-upcoming" "03-filters" "04-projects" "05-quickadd")
          i=0
          while IFS= read -r f; do
            [ "$i" -ge "${#labels[@]}" ] && break
            cp "$f" "gallery/devices/${{ steps.devname.outputs.name }}/${labels[$i]}.png"
            i=$((i+1))
          done < <(find out -name "*.png" | sort)
          ls -R gallery || true

      - name: Upload device screenshots
        uses: actions/upload-artifact@v4
        with:
          name: shots-${{ steps.devname.outputs.name }}
          path: gallery/devices/
          if-no-files-found: warn

  publish:
    needs: capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all device artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: shots-*
          merge-multiple: true

      - name: Assemble gallery + device frames
        run: |
          mkdir -p gallery/img
          cp -r artifacts/* gallery/img/ 2>/dev/null || true
          python3 .github/scripts/build_gallery.py gallery
          echo "todo.firashome.uk" > gallery/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gallery

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
