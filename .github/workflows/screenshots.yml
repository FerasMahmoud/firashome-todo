name: Screenshots

# Builds the app on a free macOS runner, walks each screen via a UI test,
# captures simulator screenshots, and publishes a device-frame gallery to
# GitHub Pages -> todo.firashome.uk.
#
# SPEED (measured 2026):
#  - PUSH (every commit) = FAST path: iPhone 16 Pro Max ONLY (~4.5 min, near floor for sim+UITest).
#  - workflow_dispatch(full=true) = all 4 devices.
#  - Homebrew/xcodegen cached (saves ~15s).
#  - Index-store disabled (project.yml) -> less compiler work.
#  - DerivedData cache REMOVED: Swift module-level invalidation recompiles broadly on any change,
#    so it didn't help and added 65MB churn.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      full:
        description: 'Render ALL 4 devices (slower)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: screenshots
  cancel-in-progress: true

jobs:
  capture:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ (github.event.inputs.full == 'true') && fromJson('["iPhone 16 Pro Max","iPhone 16 Pro","iPad Pro 13-inch (M4)","iPad mini (A17 Pro)"]') || fromJson('["iPhone 16 Pro Max"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-2026

      - name: Install XcodeGen (cached)
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build-for-testing \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -derivedDataPath build \
            -skipMacroValidation -skipPackagePluginValidation \
            | xcpretty

      - name: Run screenshot tests
        run: |
          xcodebuild test-without-building \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -only-testing:TodoScreenshotTests/ScreenshotTests \
            -resultBundlePath "results/${{ matrix.device }}.xcresult" \
            -derivedDataPath build || true

      - name: Export attachments
        run: |
          mkdir -p out
          xcrun xcresulttool export attachments \
            --path "results/${{ matrix.device }}.xcresult" \
            --output-path "out" || true

      - name: Normalize device folder name
        id: devname
        run: |
          name=$(echo "${{ matrix.device }}" | tr ' ' '-' | tr -d '()' | sed 's/[^A-Za-z0-9-]//g')
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Stage + friendly-rename screenshots
        run: |
          mkdir -p "gallery/devices/${{ steps.devname.outputs.name }}"
          python3 - <<'PY'
          import json, os, shutil, glob
          dev = os.environ["DEV"]
          out = "out"
          dest = f"gallery/devices/{dev}"
          os.makedirs(dest, exist_ok=True)
          labels = ["01-today","02-inbox","03-upcoming","04-filters","05-projects","06-quickadd"]
          # Collect attachment (filename, name) pairs from the manifest IN DOCUMENT ORDER
          # (= capture order). xcresulttool writes UUID filenames, so sorting by name
          # scrambles them; the manifest preserves order.
          ordered = []
          mani = os.path.join(out, "manifest.json")
          if os.path.exists(mani):
              try: raw = json.load(open(mani))
              except Exception: raw = None
              def walk(o):
                  if isinstance(o, dict):
                      name = o.get("name") or o.get("suggestedName") or o.get("attachmentName")
                      path = o.get("exportPath") or o.get("path") or o.get("file") or o.get("fileName")
                      if name and path and str(path).endswith(".png"):
                          ordered.append((os.path.basename(path), name))
                      for v in o.values(): walk(v)
                  elif isinstance(o, list):
                      for v in o: walk(v)
              if raw is not None: walk(raw)
          print("manifest entries (ordered):", ordered)
          if len(ordered) >= len(labels):
              for i, (fn, _) in enumerate(ordered[:len(labels)]):
                  src = None
                  for p in glob.glob(os.path.join(out, "**", fn), recursive=True):
                      src = p; break
                  if src: shutil.copy(src, os.path.join(dest, labels[i] + ".png"))
          # Fallback: positional sorted (best-effort if manifest parsing failed).
          if len(os.listdir(dest)) < len(labels):
              for f in os.listdir(dest): os.remove(os.path.join(dest, f))
              pngs = sorted(glob.glob(os.path.join(out, "**", "*.png"), recursive=True))
              for i, p in enumerate(pngs):
                  if i >= len(labels): break
                  shutil.copy(p, os.path.join(dest, labels[i] + ".png"))
          print("Staged:", sorted(os.listdir(dest)))
          PY
          ls -R gallery || true
        env:
          DEV: ${{ steps.devname.outputs.name }}

      - name: Upload device screenshots
        uses: actions/upload-artifact@v4
        with:
          name: shots-${{ steps.devname.outputs.name }}
          path: gallery/devices/
          if-no-files-found: warn

  publish:
    needs: capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all device artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: shots-*
          merge-multiple: true

      - name: Assemble gallery + device frames
        run: |
          mkdir -p gallery/img
          cp -r artifacts/* gallery/img/ 2>/dev/null || true
          python3 .github/scripts/build_gallery.py gallery
          echo "todo.firashome.uk" > gallery/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gallery

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
