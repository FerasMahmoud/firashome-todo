name: Screenshots

# Builds the app on a free macOS runner, captures each screen, and publishes a
# device-frame gallery to GitHub Pages -> todo.firashome.uk.
#
# SPEED/ROBUSTNESS (measured 2026):
#  - PUSH = FAST path: 1 iPhone, ~4 min.
#  - workflow_dispatch(full=true) = iPhone + iPad.
#  - Simulator is RESOLVED DYNAMICALLY from what's actually installed on the runner
#    (hardcoded names like "iPhone 16 Pro Max" aren't always present -> build fails).
#  - Homebrew/xcodegen cached; index-store disabled.
#  - Publish is GUARDED: never clobbers the live gallery with an empty/failed capture.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      full:
        description: 'Render iPhone AND iPad (slower)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: screenshots
  cancel-in-progress: true

jobs:
  capture:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ (github.event.inputs.full == 'true') && fromJson('[{"label":"iPhone","pick":"iPhone"},{"label":"iPad","pick":"iPad"}]') || fromJson('[{"label":"iPhone","pick":"iPhone"}]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve an available simulator
        id: sim
        run: |
          name=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | .value[] | select(.isAvailable and (.name | test("${{ matrix.device.pick }}"))) | .name' \
            | head -1)
          echo "Using simulator: $name"
          if [ -z "$name" ]; then echo "No ${{ matrix.device.pick }} simulator available"; exit 1; fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-2026

      - name: Install XcodeGen (cached)
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build-for-testing \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -derivedDataPath build \
            -skipMacroValidation -skipPackagePluginValidation \
            | xcpretty

      - name: Run screenshot tests
        run: |
          xcodebuild test-without-building \
            -scheme Todo \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -only-testing:TodoScreenshotTests/ScreenshotTests \
            -resultBundlePath "results/${{ matrix.device.label }}.xcresult" \
            -derivedDataPath build

      - name: Export attachments
        run: |
          mkdir -p out
          xcrun xcresulttool export attachments \
            --path "results/${{ matrix.device.label }}.xcresult" \
            --output-path "out"

      - name: Stage + friendly-rename screenshots (preserve capture order)
        run: |
          python3 - <<'PY'
          import json, os, shutil, glob
          out = "out"
          dest = f"gallery/devices/${{ matrix.device.label }}"
          os.makedirs(dest, exist_ok=True)
          labels = ["01-today","02-inbox","03-upcoming","04-filters","05-projects","06-quickadd"]
          ordered = []
          mani = os.path.join(out, "manifest.json")
          if os.path.exists(mani):
              try: raw = json.load(open(mani))
              except Exception: raw = None
              def walk(o):
                  if isinstance(o, dict):
                      name = o.get("name") or o.get("suggestedName") or o.get("attachmentName")
                      path = o.get("exportPath") or o.get("path") or o.get("file") or o.get("fileName")
                      if name and path and str(path).endswith(".png"):
                          ordered.append((os.path.basename(path), name))
                      for v in o.values(): walk(v)
                  elif isinstance(o, list):
                      for v in o: walk(v)
              if raw is not None: walk(raw)
          print("manifest entries (ordered):", ordered)
          if len(ordered) >= len(labels):
              for i, (fn, _) in enumerate(ordered[:len(labels)]):
                  hits = glob.glob(os.path.join(out, "**", fn), recursive=True)
                  if hits: shutil.copy(hits[0], os.path.join(dest, labels[i] + ".png"))
          if len(os.listdir(dest)) < len(labels):
              for f in os.listdir(dest): os.remove(os.path.join(dest, f))
              for i, p in enumerate(sorted(glob.glob(os.path.join(out, "**", "*.png"), recursive=True))):
                  if i >= len(labels): break
                  shutil.copy(p, os.path.join(dest, labels[i] + ".png"))
          print("Staged:", sorted(os.listdir(dest)))
          PY
          ls -R gallery || true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: shots-${{ matrix.device.label }}
          path: gallery/devices/
          if-no-files-found: error

  publish:
    needs: capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download device artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: shots-*
          merge-multiple: true

      - name: Assemble gallery
        run: |
          mkdir -p gallery/img
          cp -r artifacts/* gallery/img/ 2>/dev/null || true
          COUNT=$(find gallery/img -name "*.png" | wc -l)
          echo "Screenshot count: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_ENV"
          if [ "$COUNT" -gt 0 ]; then
            python3 .github/scripts/build_gallery.py gallery
            echo "todo.firashome.uk" > gallery/CNAME
          fi

      - name: Upload Pages artifact
        if: env.count != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: gallery

      - name: Deploy to GitHub Pages
        if: env.count != '0'
        uses: actions/deploy-pages@v4

      - name: Skip deploy (no screenshots — keeping live gallery intact)
        if: env.count == '0'
        run: echo "No screenshots captured this run; live gallery left untouched."
